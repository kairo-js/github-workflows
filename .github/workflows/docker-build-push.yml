name: Docker Build & Push

on:
  workflow_call:
    inputs:
      services:
        description: >
          JSON array of services to build & push, e.g.
          [{"name":"backend","context":"./backend"},{"name":"frontend","context":"./frontend"}].
          Each image is pushed as "<DOCKERHUB_USERNAME>/<image-prefix>-<name>:<tag>".
        required: true
        type: string
      image-prefix:
        description: Docker Hub repository prefix, e.g. "mc-werewolf" -> mc-werewolf-backend.
        required: true
        type: string
      tag:
        description: Tag applied to all built images (e.g. "dev" or a version tag).
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(inputs.services) }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-prefix }}-${{ matrix.service.name }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
