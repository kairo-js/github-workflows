name: Web App Release

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      image-prefix:
        required: true
        type: string
      services:
        description: JSON array passed to docker-build-push.yml.
        required: true
        type: string
      postgres-user:
        required: true
        type: string
      postgres-db:
        required: true
        type: string
      caddy-snippet-template-path:
        required: true
        type: string
      acme-email:
        required: true
        type: string
      prod-backup-prefix:
        required: true
        type: string
      compose-path:
        required: false
        type: string
        default: deploy/docker-compose.yml
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DEPLOY_HOST:
        required: true
      DEPLOY_USER:
        required: true
      DEPLOY_SSH_KEY:
        required: true
      DEV_POSTGRES_PASSWORD:
        required: true
      PROD_POSTGRES_PASSWORD:
        required: true
      PROXY_HOST:
        required: true
      PROXY_USER:
        required: true
      PROXY_SSH_KEY:
        required: true
      RCLONE_CONFIG:
        required: true
      PROD_GDRIVE_DESTINATION:
        required: true
      BASIC_AUTH_DEV_USER:
        required: false
      BASIC_AUTH_DEV_HASH:
        required: false
      BASIC_AUTH_ADMIN_USER:
        required: false
      BASIC_AUTH_ADMIN_HASH:
        required: false

permissions:
  contents: read

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      deploy-env-name: ${{ steps.vars.outputs.deploy-env-name }}
    steps:
      - name: Determine image tag and deploy environment
        id: vars
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "deploy-env-name=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
            echo "deploy-env-name=dev" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: vars
    uses: kairo-js/github-workflows/.github/workflows/docker-build-push.yml@v0.1.1
    with:
      services: ${{ inputs.services }}
      image-prefix: ${{ inputs.image-prefix }}
      tag: ${{ needs.vars.outputs.tag }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  pre-prod-backup:
    needs: [vars, build-and-push]
    if: ${{ needs.vars.outputs.deploy-env-name == 'prod' }}
    uses: kairo-js/github-workflows/.github/workflows/postgres-backup.yml@v0.1.1
    with:
      app-name: ${{ inputs.app-name }}
      deploy-env-name: prod
      compose-path: ${{ inputs.compose-path }}
      db-user: ${{ inputs.postgres-user }}
      db-name: ${{ inputs.postgres-db }}
      backup-prefix: ${{ inputs.prod-backup-prefix }}
      skip-if-missing: true
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
      BACKUP_GDRIVE_DESTINATION: ${{ secrets.PROD_GDRIVE_DESTINATION }}

  deploy-dev:
    needs: [vars, build-and-push]
    if: ${{ needs.vars.outputs.deploy-env-name == 'dev' }}
    uses: kairo-js/github-workflows/.github/workflows/app-deploy.yml@v0.1.1
    with:
      app-name: ${{ inputs.app-name }}
      image-prefix: ${{ inputs.image-prefix }}
      deploy-env-name: dev
      image-tag: ${{ needs.vars.outputs.tag }}
      app-env: dev
      postgres-user: ${{ inputs.postgres-user }}
      postgres-db: ${{ inputs.postgres-db }}
      compose-path: ${{ inputs.compose-path }}
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}

  deploy-prod:
    needs: [vars, build-and-push, pre-prod-backup]
    if: ${{ needs.vars.outputs.deploy-env-name == 'prod' && needs.pre-prod-backup.result == 'success' }}
    uses: kairo-js/github-workflows/.github/workflows/app-deploy.yml@v0.1.1
    with:
      app-name: ${{ inputs.app-name }}
      image-prefix: ${{ inputs.image-prefix }}
      deploy-env-name: prod
      image-tag: ${{ needs.vars.outputs.tag }}
      app-env: prod
      postgres-user: ${{ inputs.postgres-user }}
      postgres-db: ${{ inputs.postgres-db }}
      compose-path: ${{ inputs.compose-path }}
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}

  deploy-caddy-dev:
    needs: deploy-dev
    if: ${{ needs.deploy-dev.result == 'success' }}
    uses: kairo-js/github-workflows/.github/workflows/caddy-snippet-deploy.yml@v0.1.1
    with:
      app-name: ${{ inputs.app-name }}
      snippet-template-path: ${{ inputs.caddy-snippet-template-path }}
      acme-email: ${{ inputs.acme-email }}
    secrets:
      PROXY_HOST: ${{ secrets.PROXY_HOST }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_SSH_KEY: ${{ secrets.PROXY_SSH_KEY }}
      BASIC_AUTH_DEV_USER: ${{ secrets.BASIC_AUTH_DEV_USER }}
      BASIC_AUTH_DEV_HASH: ${{ secrets.BASIC_AUTH_DEV_HASH }}
      BASIC_AUTH_ADMIN_USER: ${{ secrets.BASIC_AUTH_ADMIN_USER }}
      BASIC_AUTH_ADMIN_HASH: ${{ secrets.BASIC_AUTH_ADMIN_HASH }}

  deploy-caddy-prod:
    needs: deploy-prod
    if: ${{ needs.deploy-prod.result == 'success' }}
    uses: kairo-js/github-workflows/.github/workflows/caddy-snippet-deploy.yml@v0.1.1
    with:
      app-name: ${{ inputs.app-name }}
      snippet-template-path: ${{ inputs.caddy-snippet-template-path }}
      acme-email: ${{ inputs.acme-email }}
    secrets:
      PROXY_HOST: ${{ secrets.PROXY_HOST }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_SSH_KEY: ${{ secrets.PROXY_SSH_KEY }}
      BASIC_AUTH_DEV_USER: ${{ secrets.BASIC_AUTH_DEV_USER }}
      BASIC_AUTH_DEV_HASH: ${{ secrets.BASIC_AUTH_DEV_HASH }}
      BASIC_AUTH_ADMIN_USER: ${{ secrets.BASIC_AUTH_ADMIN_USER }}
      BASIC_AUTH_ADMIN_HASH: ${{ secrets.BASIC_AUTH_ADMIN_HASH }}
